name: CI Frontend

on:
  push:
    branches:
      - main
      - dev
      - 'release/**'
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - dev

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build Angular (production)
        run: npm run build
