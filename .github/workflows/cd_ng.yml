name: CD Frontend

on:
  workflow_run:
    workflows: ["CI Frontend"]
    types:
      - completed

jobs:
  prepare:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'main' ||
      github.event.workflow_run.head_branch == 'dev' ||
      startsWith(github.event.workflow_run.head_branch, 'release/'))
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.extract.outputs.image_tag }}
      latest_tag: ${{ steps.extract.outputs.latest_tag }}
    steps:
      - name: Extract branch name and generate tag
        id: extract
        run: |
          BRANCH_NAME="${{ github.event.workflow_run.head_branch }}"
          IMAGE_TAG=""
          LATEST_TAG=""

          if [[ "$BRANCH_NAME" == "dev" ]]; then
            IMAGE_TAG="dev-${{ github.run_number }}"
            LATEST_TAG="dev"
          elif [[ "$BRANCH_NAME" == "main" ]]; then
            IMAGE_TAG="prod-${{ github.run_number }}"
            LATEST_TAG="prod"
          elif [[ "$BRANCH_NAME" == release/* ]]; then
            RELEASE_NAME="${BRANCH_NAME#release/}"
            IMAGE_TAG="staging-${RELEASE_NAME}-${{ github.run_number }}"
            LATEST_TAG="staging"
          elif [[ "$BRANCH_NAME" == feature/* ]]; then
            FEATURE_NAME="${BRANCH_NAME#feature/}"
            IMAGE_TAG="feat-${FEATURE_NAME}-${{ github.run_number }}"
          elif [[ "$BRANCH_NAME" == fix/* ]]; then
            FIX_NAME="${BRANCH_NAME#fix/}"
            IMAGE_TAG="fix-${FIX_NAME}-${{ github.run_number }}"
          else
            IMAGE_TAG="build-${{ github.run_number }}"
          fi

          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          if [[ -n "$LATEST_TAG" ]]; then
            echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Prepare names
        id: names
        run: |
          echo "owner_lc=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "repo_lc=$(echo ${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ needs.prepare.outputs.image_tag }}
          restore-keys: |
            ${{ runner.os }}-docker

      - name: Build Docker image with cache
        run: |
          docker buildx build \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new \
            --tag ghcr.io/${{ steps.names.outputs.owner_lc }}/${{ steps.names.outputs.repo_lc }}:${{ needs.prepare.outputs.image_tag }} \
            --load .

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ steps.names.outputs.owner_lc }}/${{ steps.names.outputs.repo_lc }}:${{ needs.prepare.outputs.image_tag }}
          format: 'table'
          ignore-unfixed: true

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ steps.names.outputs.owner_lc }}/${{ steps.names.outputs.repo_lc }}:${{ needs.prepare.outputs.image_tag }}

      - name: Tag and push as latest-tag
        if: ${{ needs.prepare.outputs.latest_tag != '' }}
        run: |
          echo "Retagging image as '${{ needs.prepare.outputs.latest_tag }}'"
          docker tag \
            ghcr.io/${{ steps.names.outputs.owner_lc }}/${{ steps.names.outputs.repo_lc }}:${{ needs.prepare.outputs.image_tag }} \
            ghcr.io/${{ steps.names.outputs.owner_lc }}/${{ steps.names.outputs.repo_lc }}:${{ needs.prepare.outputs.latest_tag }}
          docker push ghcr.io/${{ steps.names.outputs.owner_lc }}/${{ steps.names.outputs.repo_lc }}:${{ needs.prepare.outputs.latest_tag }}
