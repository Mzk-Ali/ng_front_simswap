<div class="max-w-xl w-full mx-auto p-1.5 rounded-[36px] lg:rounded-[56px]" style="background: linear-gradient(180deg, rgba(233, 30, 99, 0.4) 10%, rgba(33, 150, 243, 0) 30%)">
    <div class="w-full flex flex-col items-center gap-10 bg-[#f8f9fa] px-2 py-10 rounded-[33px] sm:p-10 lg:rounded-[53px]">
        <div class="gap-4 flex flex-col items-center">
            <div class="flex justify-center items-center border-2 border-pink-500 rounded-full" style="height: 3.2rem; width: 3.2rem">
                <i class="pi pi-fw pi-exclamation-circle text-2xl! text-pink-500"></i>
            </div>
            <h1 class="font-bold text-3xl lg:text-5xl mb-2">Erreur Serveur</h1>
            <span class="text-muted-color mb-8 text-center">La communication avec le serveur n'est plus disponible.</span>
            <img src="https://primefaces.org/cdn/templates/sakai/auth/asset-error.svg" alt="Error" class="mb-8" width="80%" />
            <div class="col-span-12 text-center">
                <p-button label="Actualiser la page" (onClick)="reload()" severity="danger" />
            </div>
        </div>
    </div>
</div>
